<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SpotSub</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .card h2 {
      margin: 0 0 10px;
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #1db954;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

<h1>🎧 SpotSub</h1>

<div class="card">
  <h2>Индивидуальная</h2>
  <div class="price">220 ₽ / 1 мес</div>
  <button onclick="buy('individual','Индивидуальная','1m',220,'1 месяц')">
    Купить
  </button>
</div>

<div class="card">
  <h2>🔥 6 месяцев (выгодно)</h2>
  <div class="price">1100 ₽</div>
  <button onclick="buy('individual','Индивидуальная','6m',1100,'6 месяцев')">
    Купить
  </button>
</div>

<div class="card">
  <h2>💎 1 год</h2>
  <div class="price">1800 ₽</div>
  <button onclick="buy('individual','Индивидуальная','12m',1800,'1 год')">
    Купить
  </button>
</div>

<div class="card">
  <h2>Duo</h2>
  <div class="price">349 ₽</div>
  <button onclick="buy('duo','Duo','1m',349,'1 месяц')">
    Купить
  </button>
</div>

<div class="card">
  <h2>Family</h2>
  <div class="price">499 ₽</div>
  <button onclick="buy('family','Family','1m',499,'1 месяц')">
    Купить
  </button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  function buy(plan_key, plan_name, duration, price, dur_text) {
    const data = {
      plan_key: plan_key,
      plan_name: plan_name,
      duration: duration,
      price_rub: price,
      dur_text: dur_text
    };

    tg.sendData(JSON.stringify(data));
  }
</script>

</body>
</html>
