<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SpotSub</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --spotify-green: #1db954;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--tg-theme-bg-color, #000000);
      color: var(--tg-theme-text-color, #ffffff);
      padding: 24px 20px;
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(29, 185, 84, 0.15), transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(29, 185, 84, 0.1), transparent 40%);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header p {
      margin: 6px 0 0;
      font-size: 15px;
      color: var(--tg-theme-hint-color, rgba(255, 255, 255, 0.6));
    }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .card:active {
      transform: scale(0.98);
    }

    /* Стили для формы ввода */
    .form-group {
      margin-bottom: 12px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      color: var(--tg-theme-text-color, #ffffff);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input::placeholder {
      color: var(--tg-theme-hint-color, rgba(255, 255, 255, 0.4));
    }

    input:focus {
      border-color: var(--spotify-green);
      background: rgba(0, 0, 0, 0.4);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 16px;
    }

    .card h2 {
      margin: 0;
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .price-block {
      text-align: right;
    }

    .price {
      font-size: 20px;
      font-weight: 700;
      color: var(--spotify-green);
    }

    .duration {
      font-size: 13px;
      color: var(--tg-theme-hint-color, rgba(255, 255, 255, 0.5));
      margin-top: 2px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: var(--spotify-green);
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(29, 185, 84, 0.3);
      transition: opacity 0.2s, transform 0.2s;
    }

    button:active {
      opacity: 0.8;
      transform: translateY(1px);
    }

    .badge {
      display: inline-block;
      background: rgba(29, 185, 84, 0.2);
      color: var(--spotify-green);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 8px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🎧 SpotSub</h1>
  <p>Оформление подписки</p>
</div>

<div class="card" style="border-color: rgba(255, 255, 255, 0.2);">
  <h2 style="margin-bottom: 16px; font-size: 17px;">Данные аккаунта</h2>
  <div class="form-group">
    <input type="email" id="spot_email" placeholder="Email от Spotify" autocomplete="email">
  </div>
  <div class="form-group">
    <input type="text" id="spot_pass" placeholder="Пароль от Spotify">
  </div>
</div>

<div class="card">
  <div class="card-header">
    <h2>Индивидуальная</h2>
    <div class="price-block">
      <div class="price">220 ₽</div>
      <div class="duration">1 месяц</div>
    </div>
  </div>
  <button onclick="buy('individual','Индивидуальная','1m',220,'1 месяц')">Оформить</button>
</div>

<div class="card" style="border-color: rgba(29, 185, 84, 0.4);">
  <div class="badge">Выгодно</div>
  <div class="card-header">
    <h2>Индивидуальная</h2>
    <div class="price-block">
      <div class="price">1100 ₽</div>
      <div class="duration">6 месяцев</div>
    </div>
  </div>
  <button onclick="buy('individual','Индивидуальная','6m',1100,'6 месяцев')">Оформить</button>
</div>

<div class="card">
  <div class="card-header">
    <h2>Индивидуальная</h2>
    <div class="price-block">
      <div class="price">1800 ₽</div>
      <div class="duration">1 год</div>
    </div>
  </div>
  <button onclick="buy('individual','Индивидуальная','12m',1800,'1 год')">Оформить</button>
</div>

<div class="card">
  <div class="card-header">
    <h2>Duo</h2>
    <div class="price-block">
      <div class="price">349 ₽</div>
      <div class="duration">1 месяц</div>
    </div>
  </div>
  <button onclick="buy('duo','Duo','1m',349,'1 месяц')">Оформить</button>
</div>

<div class="card">
  <div class="card-header">
    <h2>Family</h2>
    <div class="price-block">
      <div class="price">499 ₽</div>
      <div class="duration">1 месяц</div>
    </div>
  </div>
  <button onclick="buy('family','Family','1m',499,'1 месяц')">Оформить</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  document.body.addEventListener('touchmove', function(e) {
    if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
      // Оставляем пустой обработчик для правильной работы скролла
    }
  }, { passive: false });

  function buy(plan_key, plan_name, duration, price, dur_text) {
    tg.HapticFeedback.impactOccurred('light');

    // Получаем данные из полей
    const email = document.getElementById('spot_email').value.trim();
    const pass = document.getElementById('spot_pass').value.trim();

    // Проверка: если поля пустые, не даем купить
    if (!email || !pass) {
      tg.showAlert("⚠️ Пожалуйста, введите Email и Пароль от аккаунта Spotify.");
      return;
    }

    const data = {
      plan_key: plan_key,
      plan_name: plan_name,
      duration: duration,
      price_rub: price,
      dur_text: dur_text,
      account_email: email, // Передаем почту в бота
      account_pass: pass    // Передаем пароль в бота
    };

    tg.sendData(JSON.stringify(data));
  }
</script>

</body>
</html>
