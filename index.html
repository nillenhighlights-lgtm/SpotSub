<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Адаптируем цвета под тему пользователя в Telegram */
        body {
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h2 { text-align: center; margin-bottom: 20px; }
        .category { font-weight: bold; margin-top: 20px; margin-bottom: 10px; color: var(--tg-theme-hint-color, #999999); }
        
        .plan-card {
            background-color: var(--tg-theme-secondary-bg-color, #f1f1f1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.1s;
        }
        .plan-card:active { transform: scale(0.97); }
        
        .plan-info h3 { margin: 0 0 5px 0; font-size: 16px; }
        .plan-info p { margin: 0; font-size: 13px; color: var(--tg-theme-hint-color, #999999); }
        .plan-price { font-weight: bold; font-size: 16px; color: var(--tg-theme-button-color, #3390ec); }
    </style>
</head>
<body>

    <h2>Выберите подписку 🎧</h2>

    <div class="category">Индивидуальная</div>
    <div class="plan-card" onclick="selectPlan('individual', '1m', 220, 'Индивидуальная', '1 мес.')">
        <div class="plan-info"><h3>1 месяц</h3><p>Один аккаунт</p></div>
        <div class="plan-price">220 ₽</div>
    </div>
    <div class="plan-card" onclick="selectPlan('individual', '6m', 1100, 'Индивидуальная', '6 мес.')">
        <div class="plan-info"><h3>🔥 6 месяцев</h3><p>Рекомендуем</p></div>
        <div class="plan-price">1100 ₽</div>
    </div>
    <div class="plan-card" onclick="selectPlan('individual', '12m', 1800, 'Индивидуальная', '1 год')">
        <div class="plan-info"><h3>💎 1 год</h3><p>Максимальная выгода</p></div>
        <div class="plan-price">1800 ₽</div>
    </div>

    <div class="category">Общие</div>
    <div class="plan-card" onclick="selectPlan('duo', '1m', 349, 'Duo (Для двоих)', '1 мес.')">
        <div class="plan-info"><h3>Duo</h3><p>Для двоих (1 мес)</p></div>
        <div class="plan-price">349 ₽</div>
    </div>
    <div class="plan-card" onclick="selectPlan('family', '1m', 499, 'Семейная', '1 мес.')">
        <div class="plan-info"><h3>Family ⭐️</h3><p>До 6 человек (1 мес)</p></div>
        <div class="plan-price">499 ₽</div>
    </div>

    <script>
        // Инициализируем Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        // Функция отправки данных в бота при клике на карточку
        function selectPlan(planKey, duration, price, planName, durText) {
            let orderData = {
                plan_key: planKey,
                duration: duration,
                price_rub: price,
                plan_name: planName,
                dur_text: durText
            };
            
            // Метод sendData работает только если Web App открыт с обычной клавиатуры (ReplyKeyboardMarkup)
            tg.sendData(JSON.stringify(orderData));
        }
    </script>
</body>
</html>
