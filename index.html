<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Squirrel Run 🐿</title>
<style>
body {
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

#game {
    width:100%;
    height:100vh;
    position:relative;
}

#ground {
    position:absolute;
    bottom:0;
    width:100%;
    height:5px;
    background:#d4ff00;
}

#squirrel {
    position:absolute;
    bottom:5px;
    left:50px;
    width:50px;
    height:50px;
    font-size:40px;
}

.obstacle {
    position:absolute;
    bottom:5px;
    width:40px;
    height:40px;
    background:red;
    border-radius:5px;
}

#score {
    position:absolute;
    top:10px;
    left:10px;
    font-size:20px;
}

#start {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:20px 40px;
    background:#d4ff00;
    color:black;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="game">
    <div id="score">0</div>
    <div id="start">СТАРТ</div>
    <div id="squirrel">🐿</div>
    <div id="ground"></div>
</div>

<script>
let squirrel = document.getElementById("squirrel");
let scoreEl = document.getElementById("score");
let startBtn = document.getElementById("start");

let jumping = false;
let score = 0;
let speed = 6;
let running = false;

function jump(){
    if(jumping) return;
    jumping = true;

    let up = setInterval(()=>{
        let bottom = parseInt(window.getComputedStyle(squirrel).bottom);
        if(bottom >= 150){
            clearInterval(up);

            let down = setInterval(()=>{
                let bottom = parseInt(window.getComputedStyle(squirrel).bottom);
                if(bottom <= 5){
                    clearInterval(down);
                    jumping = false;
                } else {
                    squirrel.style.bottom = bottom - 5 + "px";
                }
            },20);

        } else {
            squirrel.style.bottom = bottom + 5 + "px";
        }
    },20);
}

document.addEventListener("keydown", e=>{
    if(e.code === "Space") jump();
});

document.addEventListener("touchstart", jump);

function spawnObstacle(){
    if(!running) return;

    let obs = document.createElement("div");
    obs.className = "obstacle";
    obs.style.left = window.innerWidth + "px";

    document.getElementById("game").appendChild(obs);

    let move = setInterval(()=>{
        let left = parseInt(obs.style.left);
        obs.style.left = left - speed + "px";

        let sRect = squirrel.getBoundingClientRect();
        let oRect = obs.getBoundingClientRect();

        if(
            oRect.left < sRect.right &&
            oRect.right > sRect.left &&
            oRect.bottom > sRect.top
        ){
            running = false;
            alert("💀 Ты врезался! Очки: " + score);
            location.reload();
        }

        if(left < -50){
            obs.remove();
            clearInterval(move);
        }
    },20);

    setTimeout(spawnObstacle, 1200 - speed*50);
}

function gameLoop(){
    if(!running) return;

    score++;
    scoreEl.innerText = score;

    if(score % 200 === 0){
        speed += 1;
    }

    requestAnimationFrame(gameLoop);
}

startBtn.onclick = ()=>{
    startBtn.style.display = "none";
    running = true;
    score = 0;
    speed = 6;
    spawnObstacle();
    gameLoop();
};
</script>

</body>
</html>
